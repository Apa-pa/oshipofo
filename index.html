<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my推しポートフォリオ（推しポフォ）</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
</head>

<body>

  <div class="app">

    <!-- Left Panel -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <!-- モバイルのみ表示される「完了」ボタン -->
        <button class="sidebar-close" id="sidebarClose" aria-label="編集を閉じる">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
          完了
        </button>
        <div class="logo"><span>推しポフォ</span></div>

        <!-- モード切替タブ -->
        <div class="mode-tabs" id="modeTabs">
          <button class="mode-tab active" data-mode="genre">ジャンル構成</button>
          <button class="mode-tab" data-mode="works">my推し作品</button>
        </div>

        <input class="title-input" id="titleInput" value="my推しポートフォリオ" placeholder="タイトル" />
        <input class="name-input" id="nameInput" placeholder="あなたの名前（例：あんな）" />
      </div>

      <div class="total-bar">
        <span class="total-label">合計</span>
        <div class="total-track">
          <div class="total-fill" id="totalFill"></div>
        </div>
        <span class="total-num" id="totalNum">100%</span>
      </div>
      <div class="total-warn" id="totalWarn"></div>

      <div class="cat-list" id="catList"></div>

      <div class="add-area">
        <input class="add-input" id="addInput" placeholder="カテゴリを追加..." />
        <button class="add-btn" id="addBtn">+</button>
      </div>
    </aside>

    <!-- Right Panel -->
    <main class="main">
      <div id="exportTarget" class="export-target">
        <div class="chart-panel">
          <!-- ユーザー名表示（名前入力時のみ表示） -->
          <div class="username-display" id="usernameDisplay"></div>
          <div class="chart-hint" id="chartHint" data-html2canvas-ignore="true">詳細がある項目をクリックで内訳表示</div>
          <div class="chart-container" id="chartContainer">
            <canvas id="mainChart" role="img" aria-label="推しポートフォリオ円グラフ"></canvas>
            <div class="chart-center" id="chartCenter">
              <div class="center-title" id="centerTitle">my推し<br>ポートフォリオ</div>
            </div>
          </div>

          <!-- Drill panel -->
          <div class="drill-panel" id="drillPanel">
            <button class="drill-back" id="drillBack">← 全体に戻る</button>
            <div class="drill-label" id="drillLabel"></div>
            <div class="chart-container small">
              <canvas id="drillChart" role="img" aria-label="詳細円グラフ"></canvas>
              <div class="chart-center">
                <div class="center-title" id="drillCenterTitle"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="legend-panel">
          <div class="legend-list" id="legendList"></div>
        </div>
      </div> <!-- /export-target -->

      <!-- アクションボタンエリア（キャプチャ範囲外） -->
      <div class="action-panel">
        <div class="action-buttons">
          <button class="action-btn clear-btn" id="clearBtn" title="最初から作る">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2.5 3.5h11M5.5 3.5v-1a1 1 0 011-1h3a1 1 0 011 1v1m-6 0v10a1 1 0 001 1h5a1 1 0 001-1v-10"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            クリア
          </button>

          <button class="action-btn save-data-btn" id="saveDataBtn" title="状態を保存する">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13 13.5H3a1 1 0 01-1-1v-9a1 1 0 011-1h7l4 4v6a1 1 0 01-1 1z" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M10 2.5v3a1 1 0 01-1 1H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
              <path d="M4 13.5v-4a1 1 0 011-1h6a1 1 0 011 1v4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            作品を保存
          </button>

          <button class="action-btn export-btn" id="exportBtn" title="画像として保存">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1v9M5 7l3 3 3-3M2 12v2h12v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
            画像として保存
          </button>

          <button class="action-btn share-format-btn" id="shareFormatBtn" title="フォーマットを公開する">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path
                d="M11 5V3a2 2 0 00-2-2H5a2 2 0 00-2 2v2M4 7h8a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2V9a2 2 0 012-2z"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            フォーマットを公開
          </button>
        </div>
        <div style="display: flex; gap: 16px;">
          <a href="formats.html" class="list-link">＞ 公開フォーマットを探す</a>
          <a href="list.html" class="list-link">＞ 保存済みの一覧を見る</a>
        </div>
      </div>
  </div>
  </main>
  </div>

  <!-- モバイル専用：編集FABボタン -->
  <button class="edit-fab" id="editFab" aria-label="ポートフォリオを編集する">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
        stroke-linejoin="round" />
    </svg>
    編集する
  </button>

  <script src="app.js"></script>
</body>

</html>
